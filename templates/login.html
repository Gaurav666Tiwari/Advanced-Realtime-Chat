<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Cloud Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: #0f111a; 
        }
        .login-card {
            background: #1e1e2e; padding: 40px; border-radius: 30px;
            width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-card h2 { color: #b4befe; margin-bottom: 30px; font-weight: 800; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px;
            border: none; outline: none; background: #fff; color: #333;
        }
        .join-btn {
            width: 100%; padding: 12px; border-radius: 5px; border: none;
            background: #e0e0e0; color: #1e1e2e; font-weight: bold; cursor: pointer;
            text-transform: uppercase; margin-top: 10px;
        }
        .join-btn:hover { background: #fff; }
        p { color: #a6adc8; font-size: 14px; margin-top: 20px; }
        a { color: #b4befe; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🚀 CLOUD CHAT</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="join-btn">JOIN SPACE</button>
        </form>
        <p>New here? <a href="{{ url_for('register') }}">Create Account</a></p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p style="color: #f38ba8; margin-top: 10px;">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
